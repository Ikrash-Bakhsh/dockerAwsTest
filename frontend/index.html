<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevOpsLab - Employee Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <h1>DevOpsLab</h1>
    <p class="subtitle">Employee Management System</p>

    <!-- Login -->
    <div class="card">

        <h2>Login</h2>

        <input type="text" id="loginEmail" placeholder="Email">

        <input type="password" id="loginPassword" placeholder="Password">

        <button id="loginBtn">Login</button>

    </div>

    <!-- Add Employee -->
    <div class="card">

        <h2>Add Employee</h2>

        <input type="text" id="name" placeholder="Employee Name">

        <input type="email" id="email" placeholder="Employee Email">

        <input type="text" id="department" placeholder="Department">

        <button id="addEmployeeBtn">
            Add Employee
        </button>

    </div>

    <!-- Employee List -->

    <div class="employees">

        <h2>Employees</h2>

        <table>

            <thead>

                <tr>

                    <th>ID</th>

                    <th>Name</th>

                    <th>Email</th>

                    <th>Department</th>

                    <th>Action</th>

                </tr>

            </thead>

            <tbody id="employeeTable">

            </tbody>

        </table>

    </div>

</div>

<script src="app.js"></script>

</body>
</html>
