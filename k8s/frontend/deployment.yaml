apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend

spec:
  replicas: 2
  
  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: frontend

  template:
    metadata:
      labels:
        app: frontend

    spec:
      containers:
        - name: frontend
          image: ikrashbakhsh/frontend:latest

          ports:
            - containerPort: 80