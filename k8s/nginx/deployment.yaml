apiVersion: apps/v1
kind: Deployment

metadata:
  name: nginx

spec:
  replicas: 2
  
  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: nginx

  template:
    metadata:
      labels:
        app: nginx

    spec:
      containers:
        - name: nginx
          image: ikrashbakhsh/nginx:latest

          ports:
            - containerPort: 80