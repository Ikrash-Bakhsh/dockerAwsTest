backend:
  build: ikrashbakhsh/backend:latest
  container_name: backend
  restart: always

  depends_on:
    postgres:
      condition: service_healthy

  environment:
    DB_HOST: postgres
    DB_USER: admin
    DB_PASSWORD: "1234"
    DB_NAME: database

  ports:
    - "5000:5000"

  healthcheck:
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/api/health"]
    interval: 10s
    timeout: 5s
    retries: 5

frontend:
  build: ikrashbakhsh/frontend:latest
  container_name: frontend
  restart: always

  depends_on:
    backend:
      condition: service_healthy

nginx:
  build: ikrashbakhsh/nginx:latest
  container_name: nginx
  restart: always

  depends_on:
    frontend:
      condition: service_started

  ports:
    - "80:80"